<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Top label -->
  <text x="160" y="28" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-weight="400"
        font-size="10"
        fill="#D4AF37"
        letter-spacing="8">PRESENTED BY</text>

  <!-- Decorative line -->
  <line x1="110" y1="38" x2="210" y2="38" stroke="#D4AF37" stroke-width="0.6" />

  <!-- Main name -->
  <text x="160" y="78" text-anchor="middle"
        font-family="'Times New Roman', 'Georgia', serif"
        font-weight="300"
        font-size="34"
        fill="#FFFFFF"
        letter-spacing="4">Yu Shitamachi</text>

  <!-- Bottom kanji (subtle) -->
  <text x="160" y="98" text-anchor="middle"
        font-family="'Noto Serif JP', 'Yu Mincho', serif"
        font-weight="300"
        font-size="11"
        fill="#888888"
        letter-spacing="6">下町 優</text>
</svg>
